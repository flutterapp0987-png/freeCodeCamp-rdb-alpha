<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>😂 Random Joke Generator</h1>
        
        <div class="joke-card" id="jokeCard">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color: #667eea; font-size: 1.1rem;">Loading a funny joke...</p>
            </div>
        </div>
        
        <div class="button-container">
            <button class="btn btn-primary" id="getJokeBtn">Get a Joke</button>
            <button class="btn btn-secondary" id="copyJokeBtn">Copy Joke</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="script.js"></script>
</body>
</html>
